<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Esse video está hospedado no meu próprio servidor</p>
   <video controls width="560" poster="imagens/mar.png" autoplay loop>
      <source src="midia/meu-video.mkv.mkv" type="video/mp4">
      <source src="midia/meu-video.webm.webm" type="video/webm">
      <source src="midia/meu-video.mp4" type="midia/mp4">
      <source src="midia/meu-video.ogv.ogv" type="video/ogg">
      <p>Seu navegador não tem compatibilidade com vídeos</p>
   </video>

   <h1>Inserindo videos do youtube</h1>
   <iframe width="560" height="315" src="https://www.youtube.com/embed/p8Nx6wu1Ezo?si=d5_etid3d3mHuDNr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
   <h1>Inserindo videos do vimeo</h1>
  <iframe src="https://player.vimeo.com/video/257399106?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="ANIMATION REEL"></iframe>
</body>
</html>
