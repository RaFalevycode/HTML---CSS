<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'exercit';
            src: url('Capture it.ttf'); format('truetype');
            font-size: normal;
            font-style: normal;
        }

        /* TIPOS DE FORMAT
        --- opentype (otf)
        --- truetype (ttf)
        --- embedded-opentype
        --- truetype-aat (Apple Advanced Typograph)
        --- svg
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'exercit', Times, serif;
            font-weight: normal;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Molestias earum culpa modi ex perspiciatis pariatur fugiat consectetur aperiam et maxime iure commodi, voluptatibus laudantium placeat obcaecati! Vel quidem ipsum aliquid.</p>
</body>
</html>
